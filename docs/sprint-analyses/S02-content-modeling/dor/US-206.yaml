# --- Required Fields ---
story_id: "US-206"
title: "Auto-generated admin forms for content types"
module: "ProjectDora.Modules.ContentModeling"
spec_refs:
  - "4.1.2.7"
sprint: "S02"
priority: "P1"

# --- User Story Statement ---
role: "As an Editor"
action: "I want create/edit forms to be automatically generated based on content type definitions"
benefit: "So that I can immediately create and edit content items when a new content type is defined"

# --- Interface Contract ---
inputs:
  - name: "typeName"
    type: "string"
    required: true
    validation: "NotEmpty, MaxLength(100)"
    example: "DestekProgrami"

outputs:
  - name: "formDefinition"
    type: "object"
    description: "Auto-generated form structure with field editors matching content type fields"

# --- Constraints ---
constraints:
  rbac:
    required_permissions:
      - "ContentManagement.Create"
    denied_roles:
      - "Anonymous"
      - "Viewer"
  data_model:
    content_type: "dynamic"
    parts:
      - "TitlePart"
      - "BodyPart"
    fields: []
  api:
    endpoint: "GET /api/v1/content-types/{typeName}"
    request_content_type: "application/json"
    response_codes:
      - 200: "Content type definition (used to render form)"
      - 404: "Content type not found"

# --- Acceptance Tests ---
acceptance_tests:
  - id: "AT-001"
    scenario: "Form auto-generated for new content type"
    given: "Content type 'DestekProgrami' is created with TextField 'ProgramAdi', NumericField 'Butce', BooleanField 'AktifMi'"
    when: "Editor navigates to create new 'DestekProgrami' content item"
    then: "Admin form displays text input for ProgramAdi, numeric input for Butce, and checkbox for AktifMi"

  - id: "AT-002"
    scenario: "Form updates when field added to content type"
    given: "Content type 'DestekProgrami' has TextField 'ProgramAdi' and form exists"
    when: "Admin adds new DateField 'BaslangicTarihi' to content type"
    then: "Next time editor opens create form, date picker for BaslangicTarihi is present"

  - id: "AT-003"
    scenario: "Form updates when field removed from content type"
    given: "Content type 'DestekProgrami' has fields ProgramAdi and Butce"
    when: "Admin removes field 'Butce' from content type"
    then: "Create/edit form no longer shows Butce field, existing content items retain stored value"

  - id: "AT-004"
    scenario: "Form renders correct editor for each field type"
    given: "Content type has HtmlField, MediaField, ContentPickerField"
    when: "Editor opens create form"
    then: "HtmlField shows rich text editor, MediaField shows file picker, ContentPickerField shows content selector"

# --- Edge Cases ---
edge_cases:
  - id: "EC-001"
    scenario: "Content type with no custom fields"
    input: "Content type 'BasitSayfa' with only TitlePart and BodyPart (no custom fields)"
    expected: "Form renders title input and body editor from parts, works correctly without custom fields"

  - id: "EC-002"
    scenario: "Required field validation on auto-generated form"
    input: "Editor submits form without filling required field 'ProgramAdi'"
    expected: "Client-side and server-side validation shows error message for required field"

# --- Dependencies ---
dependencies:
  stories: ["US-201", "US-202"]
  modules:
    - "ProjectDora.Core"
    - "ProjectDora.Modules.ContentModeling"
    - "ProjectDora.Modules.AdminPanel"
  external: []

# --- Technical Notes ---
tech_notes:
  abstraction_interface: "IContentTypeService"
  mediatr_commands: []
  mediatr_queries:
    - "GetContentTypeEditorQuery"
    - "GetContentTypeEditorQueryHandler"
  audit_events: []
  localization_keys:
    - "ContentModeling.Form.Create.Title"
    - "ContentModeling.Form.Edit.Title"
    - "ContentModeling.Form.Field.Required"
  caching:
    strategy: "ReadThrough"
    key_pattern: "contenttypeeditor:{tenantId}:{typeName}"
    ttl: "30m"
