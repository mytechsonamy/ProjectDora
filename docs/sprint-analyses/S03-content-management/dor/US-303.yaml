# --- Required Fields ---
story_id: "US-303"
title: "Immutable content versioning with version history"
module: "ProjectDora.Modules.ContentModeling"
spec_refs:
  - "4.1.3.6"
sprint: "S03"
priority: "P1"

# --- User Story Statement ---
role: "As an Editor"
action: "I want every content edit to create a new version while preserving all previous versions"
benefit: "So that I can track content changes over time and rollback to any previous version if needed"

# --- Interface Contract ---
inputs:
  - name: "contentItemId"
    type: "string"
    required: true
    validation: "NotEmpty"
    example: "4f9a8b2c3d1e"
  - name: "targetVersion"
    type: "int"
    required: true
    validation: "InclusiveBetween(1, 10000)"
    example: 2

outputs:
  - name: "versions"
    type: "List<ContentVersionDto>"
    description: "Ordered list of all versions with version number, timestamp, author, and data snapshot"
  - name: "contentItem"
    type: "ContentItemDto"
    description: "Content item at specified version (for rollback result)"

# --- Constraints ---
constraints:
  rbac:
    required_permissions:
      - "ContentManagement.EditOwn"
    denied_roles:
      - "Anonymous"
      - "Viewer"
      - "Analyst"
      - "Denetci"
  data_model:
    content_type: "dynamic"
    parts:
      - "AuditTrailPart"
      - "CommonPart"
    fields: []
  api:
    endpoint: "GET /api/v1/content/{contentType}/{contentItemId}/versions"
    request_content_type: "application/json"
    response_codes:
      - 200: "Version history returned"
      - 404: "Content item not found"
      - 403: "User lacks permission to view content"

# --- Acceptance Tests ---
acceptance_tests:
  - id: "AT-001"
    scenario: "View version history"
    given: "Content item has been edited 3 times (versions 1, 2, 3)"
    when: "User submits GET /api/v1/content/DestekProgrami/abc123/versions"
    then: "System returns array of 3 ContentVersionDto objects ordered by versionNumber descending"

  - id: "AT-002"
    scenario: "Retrieve specific version"
    given: "Content item has 3 versions"
    when: "User submits GET /api/v1/content/DestekProgrami/abc123?version=2"
    then: "System returns ContentItemDto with version=2 data (not the latest)"

  - id: "AT-003"
    scenario: "Rollback to previous version"
    given: "Content item has 3 versions and user has EditOwn permission"
    when: "User submits POST /api/v1/content/DestekProgrami/abc123/rollback with targetVersion=1"
    then: "System creates version 4 with data from version 1, returns ContentItemDto with version=4"

  - id: "AT-004"
    scenario: "Edit preserves previous version immutably"
    given: "Content item at version 1 with body='Eski metin'"
    when: "User updates body to 'Yeni metin'"
    then: "Version 2 created with 'Yeni metin', version 1 still returns 'Eski metin' when queried"

# --- Edge Cases ---
edge_cases:
  - id: "EC-001"
    scenario: "Rollback to non-existent version"
    input: "targetVersion = 99 (content item only has 3 versions)"
    expected: "API returns 400 with error: version 99 does not exist for this content item"

  - id: "EC-002"
    scenario: "Rollback to the current latest version"
    input: "targetVersion = 3 (which is already the latest version)"
    expected: "System creates version 4 as a copy of version 3 (maintains immutable history), returns 200"

  - id: "EC-003"
    scenario: "Version history for newly created item"
    input: "GET versions for content item that was just created (only version 1)"
    expected: "Returns array with single ContentVersionDto for version 1"

# --- Dependencies ---
dependencies:
  stories: ["US-301"]
  modules:
    - "ProjectDora.Core"
    - "ProjectDora.Modules.ContentModeling"
  external: []

# --- Technical Notes ---
tech_notes:
  abstraction_interface: "IContentService"
  mediatr_commands:
    - "RollbackContentItemCommand"
    - "RollbackContentItemCommandHandler"
  mediatr_queries:
    - "GetContentItemVersionsQuery"
    - "GetContentItemVersionsQueryHandler"
  audit_events:
    - "ContentItemVersionRolledBack"
  localization_keys:
    - "Content.Version.RolledBack.Success"
    - "Content.Version.NotFound"
    - "Content.Version.History.Empty"
  caching:
    strategy: "None"
    key_pattern: ""
    ttl: ""
