# --- Required Fields ---
story_id: "US-305"
title: "Linked language variants with front-end language switcher"
module: "ProjectDora.Modules.ContentModeling"
spec_refs:
  - "4.1.3.5"
sprint: "S03"
priority: "P2"

# --- User Story Statement ---
role: "As a Viewer"
action: "I want to switch between language versions of a content page directly via a language selector"
benefit: "So that I can read KOSGEB content in my preferred language without navigating back to the homepage"

# --- Interface Contract ---
inputs:
  - name: "contentItemId"
    type: "string"
    required: true
    validation: "NotEmpty"
    example: "4f9a8b2c3d1e"
  - name: "targetCulture"
    type: "string"
    required: true
    validation: "NotEmpty, MaxLength(10)"
    example: "en"

outputs:
  - name: "translatedContentItemId"
    type: "string"
    description: "Content item ID of the translation in the target culture"
  - name: "url"
    type: "string"
    description: "URL path to the translated content page"
  - name: "availableCultures"
    type: "List<CultureLink>"
    description: "List of available languages with their content URLs for the language switcher"

# --- Constraints ---
constraints:
  rbac:
    required_permissions:
      - "ContentManagement.ViewPublished"
    denied_roles: []
  data_model:
    content_type: "dynamic"
    parts:
      - "LocalizationPart"
      - "AutoroutePart"
    fields: []
  api:
    endpoint: "GET /api/v1/content/{contentType}/{contentItemId}"
    request_content_type: "application/json"
    response_codes:
      - 200: "Content item with translation links returned"
      - 404: "Content item or translation not found"

# --- Acceptance Tests ---
acceptance_tests:
  - id: "AT-001"
    scenario: "Language switcher shows available translations"
    given: "Content item exists with translations in 'tr', 'en', and 'de'"
    when: "User views the Turkish version on the front-end"
    then: "Language switcher shows links for TR (active), EN, and DE, each pointing to the respective translation's URL"

  - id: "AT-002"
    scenario: "Language switcher navigates to translated detail page"
    given: "Turkish content at /destek-programlari/kobi-destegi has English translation at /support-programs/sme-support"
    when: "User clicks 'EN' in the language switcher on the Turkish detail page"
    then: "Browser navigates to /support-programs/sme-support (the English translation), not to the English homepage"

  - id: "AT-003"
    scenario: "Missing translation shows disabled language option"
    given: "Content item has translations in 'tr' and 'en' but not 'de'"
    when: "User views the language switcher"
    then: "German (DE) option is shown as disabled/greyed out, Turkish and English are clickable"

# --- Edge Cases ---
edge_cases:
  - id: "EC-001"
    scenario: "Translation exists but is in Draft status"
    input: "English translation exists but is not published, user is anonymous"
    expected: "Language switcher shows EN as disabled (translation exists but is not publicly visible)"

  - id: "EC-002"
    scenario: "Content item with no translations"
    input: "Content item only exists in Turkish (no LocalizationSet created)"
    expected: "Language switcher shows only TR as active, no other language options available"

# --- Dependencies ---
dependencies:
  stories: ["US-304", "US-306"]
  modules:
    - "ProjectDora.Core"
    - "ProjectDora.Modules.ContentModeling"
  external: []

# --- Technical Notes ---
tech_notes:
  abstraction_interface: "IContentService"
  mediatr_commands: []
  mediatr_queries:
    - "GetAvailableTranslationsQuery"
    - "GetAvailableTranslationsQueryHandler"
  audit_events: []
  localization_keys:
    - "Content.LanguageSwitcher.NoTranslation"
    - "Content.LanguageSwitcher.DraftOnly"
  caching:
    strategy: "ReadThrough"
    key_pattern: "content:culturemap:{tenantId}:{localizationSet}"
    ttl: "10m"
