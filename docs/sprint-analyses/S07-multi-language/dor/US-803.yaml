# US-803: CulturePicker Widget and Front-End Language Switcher
# Spec: 4.1.3.5 — Language switcher navigates to translated content (not homepage)

story_id: "US-803"
title: "CulturePicker widget for front-end language switching with direct translated-content navigation"
module: "ProjectDora.Modules.Localization"
spec_refs:
  - "4.1.3.5"
sprint: "S07"
priority: "P1"

role: "As a site visitor"
action: "I want to switch the website language using a CulturePicker widget"
benefit: "So that I land directly on the translated version of the current page (e.g., the DestekProgrami detail page in English) instead of being redirected to the English homepage"

inputs:
  - name: "targetCulture"
    type: "string"
    required: true
    validation: "NotEmpty, MustBeActivatedCulture"
    example: "en"
  - name: "currentContentItemId"
    type: "string"
    required: false
    validation: "MaxLength(26)"
    example: "4q5t8j2k9f3m1p0n7w6x5y8z"
  - name: "returnUrl"
    type: "string"
    required: false
    validation: "MaxLength(2000), MustBeLocalUrl"
    example: "/tr/destek-programlari/kobi-destek-2026"

outputs:
  - name: "redirectUrl"
    type: "string"
    description: "URL of the translated content in the target culture, or current page URL with culture switched"
  - name: "cultureCookie"
    type: "string"
    description: "Updated .AspNetCore.Culture cookie value persisting the selected culture"

constraints:
  rbac:
    required_permissions: []
    denied_roles: []
  data_model:
    content_type: "N/A (widget/shape — no content type)"
    parts:
      - "LocalizationPart (to resolve LocalizationSet for target culture URL)"
      - "AutoroutePart (to resolve culture-prefixed URL for target variant)"
    fields: []
  api:
    endpoint: "POST /api/v1/localization/culture-switch"
    request_content_type: "application/json"
    response_codes:
      - 200: "Returns redirect URL for target culture"
      - 302: "Redirect to translated content URL (browser flow)"
      - 400: "Invalid culture or returnUrl"
      - 404: "No translation exists for current content in target culture — returns target culture homepage URL"

acceptance_tests:
  - id: "AT-803-001"
    scenario: "CulturePicker renders only activated and published cultures"
    given: "Tenant has Turkish (Published DestekProgrami) and English (Draft) and French (no content) active"
    when: "CulturePicker renders on the DestekProgrami detail page"
    then: "Only Turkish appears as active link; English and French appear disabled with tooltip 'Bu dilde ceviri bulunamadi'"
  - id: "AT-803-002"
    scenario: "Language switch navigates to translated content page (not homepage)"
    given: "Visitor is on /tr/destek-programlari/kobi-destek-2026 (Turkish DestekProgrami detail)"
    when: "Visitor clicks 'İngilizce' in the CulturePicker"
    then: "Visitor is redirected to /en/support-programs/sme-support-2026 (the English variant URL), NOT to /en/"
  - id: "AT-803-003"
    scenario: "Selected culture persists in cookie across navigation"
    given: "Visitor switches to English ('en') via CulturePicker"
    when: "Visitor navigates to any other page"
    then: ".AspNetCore.Culture cookie is set to 'c=en|uic=en', culture preference is remembered across requests"
  - id: "AT-803-004"
    scenario: "CulturePicker on a non-content page falls back to culture switch on current page"
    given: "Visitor is on the search results page /tr/ara?q=destek (no specific content item)"
    when: "Visitor clicks 'İngilizce' in the CulturePicker"
    then: "Visitor is redirected to /en/ara?q=destek (same page path, culture prefix swapped), cookie updated"
  - id: "AT-803-005"
    scenario: "Anonymous visitor can use the CulturePicker — no authentication required"
    given: "Visitor is not authenticated"
    when: "Visitor clicks a language in the CulturePicker"
    then: "Culture switch succeeds, cookie set, redirect occurs — no login required"

edge_cases:
  - id: "EC-803-001"
    scenario: "No translation exists for current content in target culture"
    input: "Visitor switches from Turkish DestekProgrami to English, but no English variant exists"
    expected: "Visitor redirected to /en/ (English homepage), CulturePicker showed English link as disabled — this is a fallback for direct URL manipulation"
  - id: "EC-803-002"
    scenario: "Open redirect attack via manipulated returnUrl"
    input: "returnUrl = 'https://malicious-site.com/phishing'"
    expected: "API returns 400 Bad Request — returnUrl must be a local URL. External URLs are rejected."
  - id: "EC-803-003"
    scenario: "CulturePicker with only one activated culture"
    input: "Tenant has only Turkish active"
    expected: "CulturePicker widget renders nothing (or is hidden) — no language switch options when only one culture is activated"

dependencies:
  stories: ["US-801", "US-802", "US-804"]
  modules: ["ProjectDora.Core", "ProjectDora.Modules.Localization"]
  external: []

tech_notes:
  abstraction_interface: "ILocalizationService"
  mediatr_commands:
    - "SwitchCultureCommand"
    - "SwitchCultureCommandHandler"
  mediatr_queries:
    - "GetTranslationUrlQuery"
    - "GetTranslationUrlQueryHandler"
    - "GetCulturePickerDataQuery"
    - "GetCulturePickerDataQueryHandler"
  audit_events: []
  localization_keys:
    - "CulturePicker.Label"
    - "CulturePicker.NoTranslation.Tooltip"
    - "CulturePicker.Language.Turkce"
    - "CulturePicker.Language.Ingilizce"
    - "CulturePicker.Language.Almanca"
    - "CulturePicker.Language.Arapca"
  caching:
    strategy: "WriteThrough"
    key_pattern: "localization:culturepicker:{tenantId}:{contentItemId}"
    ttl: "10m"
