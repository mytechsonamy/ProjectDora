# US-802: Content Localization with LocalizationPart
# Spec: 4.1.3.4 — Create language variants of content items for every activated language

story_id: "US-802"
title: "Create and manage language variants of content items using LocalizationPart"
module: "ProjectDora.Modules.Localization"
spec_refs:
  - "4.1.3.4"
sprint: "S07"
priority: "P1"

role: "As an Editor"
action: "I want to create and manage language variants of a content item (e.g., a DestekProgrami) for each activated language"
benefit: "So that KOSGEB can publish the same content in Turkish and English, with each variant linked together and independently publishable"

inputs:
  - name: "sourceContentItemId"
    type: "string"
    required: true
    validation: "NotEmpty, MaxLength(26)"
    example: "4q5t8j2k9f3m1p0n7w6x5y8z"
  - name: "targetCulture"
    type: "string"
    required: true
    validation: "NotEmpty, MaxLength(10), MustBeActivatedCulture"
    example: "en"
  - name: "displayText"
    type: "string"
    required: true
    validation: "NotEmpty, MaxLength(500)"
    example: "SME Support Program 2026"
  - name: "parts"
    type: "Dictionary<string, object>"
    required: false
    validation: "ValidPartNames only"
    example: "{ 'MarkdownBodyPart': { 'Markdown': 'This program supports SMEs...' } }"
  - name: "fields"
    type: "Dictionary<string, object>"
    required: false
    validation: ""
    example: "{ 'SeoTitle': 'SME Support Program 2026 - KOSGEB', 'SeoDescription': 'Detailed overview...' }"

outputs:
  - name: "contentItemId"
    type: "string"
    description: "The ID of the newly created translation variant"
  - name: "culture"
    type: "string"
    description: "Culture of the translation variant (e.g., 'en')"
  - name: "localizationSet"
    type: "string"
    description: "Shared localization set identifier linking all language variants"
  - name: "status"
    type: "string"
    description: "Publication status: Draft or Published"
  - name: "createdUtc"
    type: "DateTime"
    description: "Creation timestamp of the translation variant"

constraints:
  rbac:
    required_permissions:
      - "Localization.CreateTranslation"
    denied_roles:
      - "Anonymous"
      - "Viewer"
      - "Analyst"
      - "Denetci"
  data_model:
    content_type: "DestekProgrami (and all content types with LocalizationPart)"
    parts:
      - "LocalizationPart (Culture, LocalizationSet)"
      - "AutoroutePart (per-culture slug)"
      - "TitlePart"
      - "MarkdownBodyPart"
    fields:
      - "Culture (string, e.g. 'tr', 'en')"
      - "LocalizationSet (GUID linking variants)"
  api:
    endpoint: "POST /api/v1/content/{contentType}/{contentItemId}/translations"
    request_content_type: "application/json"
    response_codes:
      - 201: "Translation variant created successfully"
      - 400: "Validation error or target culture not activated"
      - 403: "User lacks Localization.CreateTranslation permission"
      - 404: "Source content item not found"
      - 409: "Translation for this culture already exists"

acceptance_tests:
  - id: "AT-802-001"
    scenario: "Create English translation of a Turkish DestekProgrami content item"
    given: "A published Turkish DestekProgrami item exists and English ('en') is an activated culture"
    when: "Editor creates an English translation variant with displayText 'SME Support Program 2026'"
    then: "New content item created with culture='en', shares LocalizationSet with the Turkish source, status=Draft, audit event TranslationCreated emitted"
  - id: "AT-802-002"
    scenario: "List all translations for a content item"
    given: "DestekProgrami item has Turkish (Published) and English (Draft) variants"
    when: "Editor calls GET /api/v1/content/DestekProgrami/{id}/translations"
    then: "Response lists both variants with culture codes, status, and localization set ID"
  - id: "AT-802-003"
    scenario: "Reject duplicate translation for the same culture"
    given: "DestekProgrami item already has an English variant"
    when: "Editor attempts to create another English translation for the same source item"
    then: "API returns 409 Conflict — 'Bu icerik icin en dilinde ceviri zaten mevcut'"
  - id: "AT-802-004"
    scenario: "Viewer cannot create translations"
    given: "User has Viewer role"
    when: "User attempts to create a translation variant"
    then: "API returns 403 Forbidden"
  - id: "AT-802-005"
    scenario: "Translation variant is independently publishable"
    given: "DestekProgrami has Turkish (Published) and English (Draft) variants"
    when: "Editor publishes the English variant"
    then: "English variant status becomes Published, Turkish variant status is unchanged"

edge_cases:
  - id: "EC-802-001"
    scenario: "Creating translation for a non-activated culture"
    input: "targetCulture = 'de' (German not activated for this tenant)"
    expected: "API returns 400 Bad Request — 'de dili bu kiracida aktif degil. Once dili etkinlestirin.'"
  - id: "EC-802-002"
    scenario: "Source content item is in Draft status"
    input: "sourceContentItemId points to an unpublished Draft DestekProgrami"
    expected: "Translation can be created from Draft source — system allows it, translation is created as Draft"
  - id: "EC-802-003"
    scenario: "Deleting a translation variant does not affect other variants"
    input: "Delete English variant of a DestekProgrami that also has Turkish and French variants"
    expected: "Only English variant deleted; Turkish and French variants remain intact; localization set persists with two members"

dependencies:
  stories: ["US-801", "US-301", "US-302"]
  modules: ["ProjectDora.Core", "ProjectDora.Modules.Localization", "ProjectDora.Modules.ContentModeling"]
  external: []

tech_notes:
  abstraction_interface: "ILocalizationService"
  mediatr_commands:
    - "CreateTranslationVariantCommand"
    - "CreateTranslationVariantCommandHandler"
    - "DeleteTranslationVariantCommand"
    - "DeleteTranslationVariantCommandHandler"
  mediatr_queries:
    - "GetContentTranslationsQuery"
    - "GetContentTranslationsQueryHandler"
    - "GetTranslationVariantQuery"
    - "GetTranslationVariantQueryHandler"
  audit_events:
    - "TranslationCreated"
    - "TranslationUpdated"
    - "TranslationDeleted"
    - "TranslationPublished"
  localization_keys:
    - "Translation.Created.Success"
    - "Translation.Deleted.Success"
    - "Translation.Validation.DuplicateCulture"
    - "Translation.Validation.CultureNotActivated"
    - "Translation.Validation.SourceNotFound"
    - "Translation.Status.Missing"
    - "Translation.Status.Draft"
    - "Translation.Status.Published"
    - "Translation.Status.Outdated"
  caching:
    strategy: "WriteThrough"
    key_pattern: "localization:translations:{tenantId}:{localizationSet}"
    ttl: "10m"
