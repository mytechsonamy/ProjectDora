# US-607: Auto-generate per-query API execution permissions
story_id: "US-607"
title: "Auto-generate per-query API execution permissions"
module: "ProjectDora.Modules.UserManagement"
spec_refs:
  - "4.1.6.4"
sprint: "S05"
priority: "P2"

role: "As the platform"
action: "I want to automatically generate an API execution permission for each saved query"
benefit: "So that TenantAdmins can control which roles can execute which queries via API on a per-query basis"

inputs:
  - name: "queryName"
    type: "string"
    required: true
    validation: "NotEmpty, must be a valid query name from QueryCreated event"
    example: "KobiDestekRaporu"
  - name: "queryId"
    type: "string"
    required: true
    validation: "NotEmpty"
    example: "query-001"

outputs:
  - name: "generatedPermission"
    type: "string"
    description: "Name of the auto-generated permission"

constraints:
  rbac:
    required_permissions: []
    denied_roles: []
  data_model:
    content_type: "Permission"
    parts: []
    fields: []
  api:
    endpoint: "N/A (event-driven, no direct API)"
    request_content_type: "N/A"
    response_codes: []

acceptance_tests:
  - id: "AT-607-01"
    scenario: "Permission auto-generated on query creation"
    given: "No saved query 'KobiDestekRaporu' exists"
    when: "Analyst creates saved query 'KobiDestekRaporu' via query management module"
    then: "Permission 'Query.Execute.KobiDestekRaporu' auto-generated and available in role editor"
  - id: "AT-607-02"
    scenario: "Query execution blocked without permission"
    given: "Query 'KobiDestekRaporu' exists, user's role does NOT have 'Query.Execute.KobiDestekRaporu' permission"
    when: "User attempts POST /api/v1/queries/{queryId}/execute"
    then: "API returns 403 Forbidden — user needs Query.Execute.KobiDestekRaporu permission"
  - id: "AT-607-03"
    scenario: "Query execution succeeds with permission"
    given: "Query 'KobiDestekRaporu' exists, user's role HAS 'Query.Execute.KobiDestekRaporu' permission"
    when: "User executes POST /api/v1/queries/{queryId}/execute"
    then: "Query executes successfully, results returned"
  - id: "AT-607-04"
    scenario: "Permission removed on query deletion"
    given: "Query 'EskiSorgu' has auto-generated permission assigned to 2 roles"
    when: "Admin deletes query 'EskiSorgu'"
    then: "Permission 'Query.Execute.EskiSorgu' removed from all roles and deregistered"

edge_cases:
  - id: "EC-607-01"
    scenario: "Query name with spaces and Turkish characters"
    input: "queryName = 'KOBI Destek Ozet Raporu'"
    expected: "Permission generated as 'Query.Execute.KOBIDestekOzetRaporu' (spaces removed, Turkish chars transliterated for permission key)"
  - id: "EC-607-02"
    scenario: "Duplicate query name in same tenant"
    input: "Two queries with sanitized name both mapping to 'Query.Execute.SameKey'"
    expected: "Second query gets unique suffix: 'Query.Execute.SameKey_2' to prevent collision"
  - id: "EC-607-03"
    scenario: "isApiExposed=false query"
    input: "Query created with isApiExposed=false"
    expected: "Permission still auto-generated (for future use), but query endpoint returns 404 until isApiExposed=true"

dependencies:
  stories: ["US-602", "US-604"]
  modules: ["ProjectDora.Core", "ProjectDora.Modules.UserManagement", "ProjectDora.Modules.QueryEngine"]
  external: []

tech_notes:
  abstraction_interface: "IRoleService"
  mediatr_commands:
    - "GenerateQueryPermissionCommand"
    - "GenerateQueryPermissionCommandHandler"
  mediatr_queries: []
  audit_events:
    - "QueryPermissionAutoGenerated"
    - "QueryPermissionAutoRemoved"
  localization_keys:
    - "Permission.AutoGenerated.Query"
    - "Permission.AutoRemoved.Query"
    - "Query.Execute.Forbidden"
  caching:
    strategy: "WriteThrough"
    key_pattern: "permissions:{tenantId}:query:{queryId}"
    ttl: "30m"
