# US-606: Auto-generate permission sets when content types are created
story_id: "US-606"
title: "Auto-generate permission sets on content type creation"
module: "ProjectDora.Modules.UserManagement"
spec_refs:
  - "4.1.6.3"
sprint: "S05"
priority: "P1"

role: "As the platform"
action: "I want to automatically generate CRUD permission entries when a new content type is created"
benefit: "So that TenantAdmins can immediately assign per-type permissions to roles without manual permission creation"

inputs:
  - name: "contentTypeName"
    type: "string"
    required: true
    validation: "NotEmpty, must be a valid content type name from ContentTypeCreated event"
    example: "DestekProgrami"

outputs:
  - name: "generatedPermissions"
    type: "List<string>"
    description: "List of auto-generated permission names"

constraints:
  rbac:
    required_permissions: []
    denied_roles: []
  data_model:
    content_type: "Permission"
    parts: []
    fields: []
  api:
    endpoint: "N/A (event-driven, no direct API)"
    request_content_type: "N/A"
    response_codes: []

acceptance_tests:
  - id: "AT-606-01"
    scenario: "Permissions auto-generated on content type creation"
    given: "No content type 'YeniProgram' exists"
    when: "TenantAdmin creates content type 'YeniProgram' via content modeling module"
    then: "4 permissions auto-generated: ContentType.YeniProgram.View, ContentType.YeniProgram.Edit, ContentType.YeniProgram.Delete, ContentType.YeniProgram.Copy"
  - id: "AT-606-02"
    scenario: "Auto-generated permissions appear in role editor"
    given: "Content type 'YeniProgram' was just created and permissions auto-generated"
    when: "TenantAdmin opens role editor and views available permissions"
    then: "ContentType.YeniProgram.* permissions appear in the content-type permission section"
  - id: "AT-606-03"
    scenario: "Permissions cleaned up on content type deletion"
    given: "Content type 'EskiTur' has auto-generated permissions, some assigned to roles"
    when: "TenantAdmin deletes content type 'EskiTur'"
    then: "ContentType.EskiTur.* permissions are removed from all roles and deregistered"
  - id: "AT-606-04"
    scenario: "Idempotent generation"
    given: "Content type 'DestekProgrami' already has auto-generated permissions"
    when: "ContentTypeCreated event fires again (e.g., during recipe import)"
    then: "No duplicate permissions created, existing ones preserved"

edge_cases:
  - id: "EC-606-01"
    scenario: "Content type name with special characters"
    input: "contentTypeName = 'KOBIDestekBasvuruFormu2026'"
    expected: "Permissions generated: ContentType.KOBIDestekBasvuruFormu2026.View/Edit/Delete/Copy — long name handled correctly"
  - id: "EC-606-02"
    scenario: "Rapid successive content type creations"
    input: "5 content types created in rapid succession within same request batch"
    expected: "All 5 x 4 = 20 permissions generated without race conditions or duplicates"
  - id: "EC-606-03"
    scenario: "Multi-tenant permission isolation"
    input: "Content type 'DestekProgrami' created in both tenant-a and tenant-b"
    expected: "Each tenant has its own independent set of ContentType.DestekProgrami.* permissions"

dependencies:
  stories: ["US-602", "US-604"]
  modules: ["ProjectDora.Core", "ProjectDora.Modules.UserManagement", "ProjectDora.Modules.ContentModeling"]
  external: []

tech_notes:
  abstraction_interface: "IRoleService"
  mediatr_commands:
    - "GenerateContentTypePermissionsCommand"
    - "GenerateContentTypePermissionsCommandHandler"
  mediatr_queries: []
  audit_events:
    - "PermissionAutoGenerated"
    - "PermissionAutoRemoved"
  localization_keys:
    - "Permission.AutoGenerated.ContentType"
    - "Permission.AutoRemoved.ContentType"
  caching:
    strategy: "WriteThrough"
    key_pattern: "permissions:{tenantId}:registry"
    ttl: "30m"
